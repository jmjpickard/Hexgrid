name = "hexgrid-worker"
main = "worker/src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "development"

[[d1_databases]]
binding = "DB"
database_name = "hexgrid-db"
database_id = "local-dev-placeholder"

[dev]
port = 8787
local_protocol = "http"
