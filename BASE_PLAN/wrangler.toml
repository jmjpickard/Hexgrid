name = "hexgrid-worker"
main = "worker/src/index.ts"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENVIRONMENT = "production"

[[d1_databases]]
binding = "DB"
database_name = "hexgrid-db"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[[queues.producers]]
queue = "hexgrid-tasks"
binding = "TASK_QUEUE"

[[queues.consumers]]
queue = "hexgrid-tasks"
max_batch_size = 10
max_batch_timeout = 30

[dev]
port = 8787
local_protocol = "http"
