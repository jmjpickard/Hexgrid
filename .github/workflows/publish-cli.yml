name: Publish CLI

on:
  workflow_dispatch:
  push:
    tags:
      - 'cli-v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish-cli:
    name: Publish @jackpickard/hexgrid-cli to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      - name: Install CLI dependencies
        run: npm ci --prefix cli

      - name: Verify CLI starts
        run: npm run --prefix cli check

      - name: Verify tag version matches package version
        if: startsWith(github.ref, 'refs/tags/cli-v')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#cli-v}"
          PACKAGE_VERSION="$(node -p "require('./cli/package.json').version")"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match cli/package.json version ($PACKAGE_VERSION)"
            exit 1
          fi

      - name: Verify publish tarball contents
        working-directory: cli
        run: npm pack --dry-run

      - name: Publish package
        working-directory: cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
