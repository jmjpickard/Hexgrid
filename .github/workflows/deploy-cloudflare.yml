name: Deploy Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_worker:
        description: Deploy the Cloudflare Worker
        required: false
        default: true
        type: boolean
      deploy_web:
        description: Deploy the Cloudflare Pages web app
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_worker == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck worker
        run: bun run --cwd worker typecheck

      - name: Inject production D1 database ID
        env:
          CF_D1_DATABASE_ID_PROD: ${{ vars.CF_D1_DATABASE_ID_PROD }}
          CF_D1_DATABASE_ID_PROD_SECRET: ${{ secrets.CF_D1_DATABASE_ID_PROD }}
        run: |
          DB_ID="${CF_D1_DATABASE_ID_PROD:-$CF_D1_DATABASE_ID_PROD_SECRET}"
          if [ -z "$DB_ID" ]; then
            echo "Set CF_D1_DATABASE_ID_PROD (repo variable or secret)"
            exit 1
          fi

          sed -i "s|REPLACE_WITH_PROD_D1_DATABASE_ID|$DB_ID|g" wrangler.toml

      - name: Validate production D1 config
        run: |
          if grep -q "REPLACE_WITH_PROD_D1_DATABASE_ID" wrangler.toml; then
            echo "Failed to inject production D1 database ID"
            exit 1
          fi

      - name: Deploy worker to Cloudflare
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.toml --env production

  deploy-web:
    name: Deploy Web (Pages)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_web == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web
        env:
          NEXT_PUBLIC_WORKER_URL: ${{ vars.NEXT_PUBLIC_WORKER_URL_PROD }}
        run: |
          if [ -z "$NEXT_PUBLIC_WORKER_URL" ]; then
            echo "GitHub variable NEXT_PUBLIC_WORKER_URL_PROD is required"
            exit 1
          fi
          bun run --cwd web typecheck
          bun run --cwd web build

      - name: Resolve Pages project name
        id: pages_project
        env:
          CF_PAGES_PROJECT_NAME: ${{ vars.CF_PAGES_PROJECT_NAME }}
        run: |
          PROJECT_NAME="${CF_PAGES_PROJECT_NAME:-hexgrid-web}"
          echo "name=$PROJECT_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy Pages project
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/out --project-name ${{ steps.pages_project.outputs.name }} --branch ${{ github.ref_name }}
