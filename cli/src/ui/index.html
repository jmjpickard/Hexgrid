<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HexGrid Local UI</title>
    <link rel="stylesheet" href="/vendor/xterm.css">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand-lockup">
          <svg width="18" height="20" viewBox="0 0 18 20" fill="none" aria-hidden="true">
            <path d="M9 0L17.66 4.5V13.5L9 18L0.34 13.5V4.5L9 0Z" fill="currentColor" fill-opacity="0.5" stroke="currentColor" stroke-width="0.5"></path>
          </svg>
          <div>
            <div class="eyebrow">HexGrid</div>
            <h1>Personal Grid</h1>
          </div>
        </div>
        <div class="topbar-meta">
          <div class="badge">hexgrid.local</div>
          <div class="badge">localhost only</div>
          <div class="badge" id="workspaceName">workspace</div>
        </div>
      </header>

      <div class="status-row">
        <div class="status-copy" id="statusCopy">Starting local UI…</div>
      </div>

      <main class="layout">
        <aside class="sidebar">
          <div class="sidebar-header">
            <h2>Hexes</h2>
            <div class="sidebar-actions">
              <button type="button" class="sidebar-button" id="addHexButton">Add Hex</button>
              <div class="sidebar-meta" id="repoCount">0</div>
            </div>
          </div>
          <div class="repo-list" id="repoList"></div>
        </aside>

        <section class="main-panel">
          <div class="repo-detail" id="repoDetail"></div>
          <div class="terminal-frame">
            <div class="terminal-header">
              <div class="terminal-title" id="terminalTitle">Terminal</div>
              <div class="terminal-meta" id="terminalMeta">idle</div>
            </div>
            <div class="terminal-surface" id="terminal"></div>
          </div>
        </section>
      </main>
    </div>

    <div class="modal-backdrop is-hidden" id="addHexModal">
      <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="addHexTitle">
        <div class="modal-header">
          <div>
            <div class="detail-label">Workspace</div>
            <h3 id="addHexTitle">Add Hex</h3>
          </div>
          <button type="button" class="modal-close" id="addHexClose">close</button>
        </div>
        <p class="modal-copy">
          Pick any folder or file on disk. New hexes onboard immediately and unlock runtimes when setup is complete.
        </p>
        <div class="picker-actions">
          <button type="button" class="is-accent" id="pickFolderButton">Pick Folder</button>
          <button type="button" id="pickFileButton">Pick File</button>
        </div>
        <div class="picker-preview" id="sourcePreview">No path selected yet.</div>
        <form class="modal-form" id="addHexForm">
          <label class="form-field">
            <span>Hex ID</span>
            <input type="text" id="repoIdInput" autocomplete="off" required>
          </label>
          <label class="form-field">
            <span>Description</span>
            <textarea id="repoDescriptionInput" rows="3" placeholder="Optional summary for this hex"></textarea>
          </label>
          <label class="form-field">
            <span>Default runtime</span>
            <select id="repoRuntimeInput">
              <option value="codex">codex</option>
              <option value="claude">claude</option>
            </select>
          </label>
          <div class="modal-footer">
            <button type="button" id="addHexCancel">Cancel</button>
            <button type="submit" class="is-accent" id="addHexSubmit" disabled>Create Hex</button>
          </div>
        </form>
      </div>
    </div>

    <script src="/vendor/xterm.js"></script>
    <script src="/vendor/addon-fit.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
