name: Deploy Cloudflare

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_worker:
        description: Deploy the Cloudflare Worker
        required: false
        default: true
        type: boolean
      deploy_web:
        description: Deploy the Cloudflare Pages web app
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: deploy-cloudflare-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-worker:
    name: Deploy Worker
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_worker == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck worker
        run: bun run --cwd worker typecheck

      - name: Inject production D1 database ID
        env:
          CF_D1_DATABASE_ID_PROD: ${{ vars.CF_D1_DATABASE_ID_PROD }}
          CF_D1_DATABASE_ID_PROD_SECRET: ${{ secrets.CF_D1_DATABASE_ID_PROD }}
        run: |
          DB_ID="${CF_D1_DATABASE_ID_PROD:-$CF_D1_DATABASE_ID_PROD_SECRET}"
          if [ -z "$DB_ID" ]; then
            echo "Set CF_D1_DATABASE_ID_PROD (repo variable or secret)"
            exit 1
          fi

          echo "PROD_D1_DATABASE_ID=$DB_ID" >> "$GITHUB_ENV"
          echo "Using production D1 database ID prefix: ${DB_ID:0:8}"
          sed -i "s|REPLACE_WITH_PROD_D1_DATABASE_ID|$DB_ID|g" wrangler.toml

      - name: Validate production D1 config
        run: |
          if grep -q "REPLACE_WITH_PROD_D1_DATABASE_ID" wrangler.toml; then
            echo "Failed to inject production D1 database ID"
            exit 1
          fi

      - name: Validate Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Run D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          WRANGLER="bunx wrangler d1 execute hexgrid-db --config wrangler.toml --env production --remote"
          for f in worker/src/db/migration-*.sql; do
            [ -f "$f" ] || continue
            echo "Running migration: $f"
            while IFS= read -r stmt; do
              stmt="$(echo "$stmt" | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//')"
              [ -z "$stmt" ] && continue
              echo "$stmt" | grep -qi '^--' && continue
              echo "  → $stmt"
              $WRANGLER --command "$stmt" || echo "  ⚠ statement failed (may already be applied)"
            done < <(sed 's/;/;\n/g' "$f")
          done

      - name: Apply production D1 schema
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          bunx wrangler d1 execute hexgrid-db --config wrangler.toml --env production --remote --file worker/src/db/schema.sql

      - name: Verify production D1 schema
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          RESULT="$(bunx wrangler d1 execute hexgrid-db --config wrangler.toml --env production --remote --command "SELECT name FROM sqlite_master WHERE type='table' AND name='users';" --json)"
          echo "$RESULT"
          if ! echo "$RESULT" | grep -q '"users"'; then
            echo "users table missing in production D1 after schema apply"
            exit 1
          fi

      - name: Validate worker secrets
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AUTH_FROM_EMAIL: ${{ secrets.AUTH_FROM_EMAIL }}
        run: |
          if [ -z "$RESEND_API_KEY" ]; then
            echo "Missing GitHub secret: RESEND_API_KEY"
            exit 1
          fi
          if [ -z "$AUTH_FROM_EMAIL" ]; then
            echo "Missing GitHub secret: AUTH_FROM_EMAIL"
            exit 1
          fi

      - name: Deploy worker to Cloudflare
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          wranglerVersion: "4.69.0"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config wrangler.toml --env production

      - name: Sync worker secrets to Cloudflare
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          AUTH_FROM_EMAIL: ${{ secrets.AUTH_FROM_EMAIL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          jq -n \
            --arg resend "$RESEND_API_KEY" \
            --arg from "$AUTH_FROM_EMAIL" \
            '{RESEND_API_KEY: $resend, AUTH_FROM_EMAIL: $from}' > /tmp/worker-secrets.json
          bunx wrangler secret bulk /tmp/worker-secrets.json --config wrangler.toml --env production

  deploy-web:
    name: Deploy Web (Pages)
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.deploy_web == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web
        env:
          NEXT_PUBLIC_WORKER_URL: ${{ vars.NEXT_PUBLIC_WORKER_URL_PROD }}
        run: |
          if [ -z "$NEXT_PUBLIC_WORKER_URL" ]; then
            echo "GitHub variable NEXT_PUBLIC_WORKER_URL_PROD is required"
            exit 1
          fi
          bun run --cwd web typecheck
          bun run --cwd web build

      - name: Resolve Pages project name
        id: pages_project
        env:
          CF_PAGES_PROJECT_NAME: ${{ vars.CF_PAGES_PROJECT_NAME }}
        run: |
          PROJECT_NAME="${CF_PAGES_PROJECT_NAME:-hexgrid-web}"
          echo "name=$PROJECT_NAME" >> "$GITHUB_OUTPUT"

      - name: Validate Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_API_TOKEN"
            exit 1
          fi
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing GitHub secret: CLOUDFLARE_ACCOUNT_ID"
            exit 1
          fi

      - name: Deploy Pages project
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        with:
          wranglerVersion: "4.69.0"
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy web/out --project-name ${{ steps.pages_project.outputs.name }} --branch ${{ github.ref_name }}
